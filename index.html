<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Portfolio - Bùi Thị Phương Thảo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            padding: 40px 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1.5s ease;
        }

        img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid white;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin: 10px 0;
        }

        .info {
            text-align: left;
            margin-top: 20px;
        }

        .info h3 {
            margin-bottom: 5px;
            color: #ffd700;
        }

        .social {
            margin-top: 20px;
        }

        .social a {
            display: inline-block;
            margin: 10px;
            padding: 10px 15px;
            border-radius: 10px;
            background: white;
            color: #333;
            font-weight: bold;
            transition: 0.3s;
            text-decoration: none;
        }

        .social a:hover {
            background: #ffd700;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <!-- Avatar đã thay -->
        <img src="https://files.catbox.moe/93qbsg.jpg" alt="avatar">

        <h1>Bùi Thị Phương Thảo</h1>
        <p>Xin chào! Em là học sinh với niềm đam mê sáng tạo ✨</p>

        <div class="info">
            <h3>📧 Gmail</h3>
            <p>thaobui12042008@gmail.com</p>

            <h3>🎯 Sở thích</h3>
            <p>Xem phim, nghe nhạc, ca hát, đi du lịch</p>

            <h3>💡 Kĩ năng</h3>
            <p>Giao tiếp tốt, sáng tạo, xử lí tình huống tốt, có trách nhiệm với bản thân</p>
        </div>

        <div class="social">
            <a href="https://www.facebook.com/share/16WrWctdm2/" target="_blank">Facebook</a>
            <a href="https://www.instagram.com/thao_kiyomi?igsh=MWk3bnBwN3Nxbm0xaA==" target="_blank">Instagram</a>
        </div>

    </div>

    <footer>
        © 2026 - Portfolio cá nhân
    </footer>
</div>

</body>
</html>
